<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ATM Browser</title>
	<!-- ATM_BROWSER_STYLES -->
</head>
<body>
	<main class="browser-home">
		<section class="search-shell" aria-label="ATM Browser search">
			<div class="brand" aria-label="ATM Browser">
				<span>A</span>
				<span>T</span>
				<span>M</span>
			</div>

			<form class="search-form" id="browser-search-form">
				<label class="search-box" for="browser-search-input">
					<span class="search-icon" aria-hidden="true">⌕</span>
					<input
						id="browser-search-input"
						name="query"
						type="search"
						placeholder="Search or enter a URL"
						autocomplete="off"
						spellcheck="false"
					>
				</label>
			</form>

			<div class="quick-actions" aria-label="Quick actions">
				<button class="quick-action" id="translate-action" type="button">Translate</button>
				<button class="quick-action" type="button">AI</button>
				<button class="quick-action" type="button">Plus</button>
			</div>
		</section>
	</main>

	<section class="browser-view" aria-label="ATM Browser page">
		<header class="browser-toolbar">
			<button class="toolbar-button" id="home-action" type="button" aria-label="Back to browser home">
				<svg class="toolbar-button-icon" viewBox="0 0 1024 1024" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
					<path d="M669.6 849.6c8.8 8 22.4 7.2 30.4-1.6s7.2-22.4-1.6-30.4l-309.6-280c-8-7.2-8-17.6 0-24.8l309.6-270.4c8.8-8 9.6-21.6 2.4-30.4-8-8.8-21.6-9.6-30.4-2.4L360.8 480.8c-27.2 24-28 64-0.8 88.8l309.6 280z"/>
				</svg>
			</button>
			<form class="toolbar-form" id="browser-toolbar-form">
				<label class="toolbar-address" for="browser-toolbar-input">
					<span class="toolbar-globe" aria-hidden="true">⌕</span>
					<input
						id="browser-toolbar-input"
						name="address"
						type="search"
						placeholder="Search or enter a URL"
						autocomplete="off"
						spellcheck="false"
					>
				</label>
			</form>
		</header>
		<iframe id="browser-frame" title="ATM Browser content"></iframe>
	</section>
	<!-- ATM_BROWSER_SCRIPT -->
</body>
</html>
