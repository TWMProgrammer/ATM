<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ATM Browser</title>
	<!-- ATM_BROWSER_STYLES -->
</head>
<body>
	<main class="browser-home">
		<section class="search-shell" aria-label="ATM Browser search">
			<div class="brand" aria-label="ATM Browser">
				<span>A</span>
				<span>T</span>
				<span>M</span>
			</div>

			<form class="search-form" id="browser-search-form">
				<label class="search-box" for="browser-search-input">
					<span class="search-icon" aria-hidden="true">⌕</span>
					<input
						id="browser-search-input"
						name="query"
						type="search"
						placeholder="Search or enter a URL"
						autocomplete="off"
						spellcheck="false"
					>
				</label>
			</form>

			<div class="quick-actions" aria-label="Quick actions">
				<button class="quick-action" id="translate-action" type="button">Translate</button>
				<button class="quick-action" id="mdn-action" type="button">MDN</button>
				<button class="quick-action" id="chatgpt-action" type="button">AI</button>
			</div>
		</section>
	</main>

	<section class="browser-view" aria-label="ATM Browser page">
		<header class="browser-toolbar">
			<button class="toolbar-button" id="back-action" type="button" aria-label="Go back" disabled>
				<svg class="toolbar-button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
					<path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
				</svg>
			</button>
			<button class="toolbar-button" id="forward-action" type="button" aria-label="Go forward" disabled>
				<svg class="toolbar-button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
					<path fill="currentColor" d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8-8-8z"/>
				</svg>
			</button>
			<button class="toolbar-button" id="home-action" type="button" aria-label="Back to browser home">
				<svg class="toolbar-button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
					<path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8h5z"/>
				</svg>
			</button>
			<form class="toolbar-form" id="browser-toolbar-form">
				<label class="toolbar-address" for="browser-toolbar-input">
					<span class="toolbar-globe" aria-hidden="true">⌕</span>
					<input
						id="browser-toolbar-input"
						name="address"
						type="search"
						placeholder="Search or enter a URL"
						autocomplete="off"
						spellcheck="false"
					>
				</label>
			</form>
			<button class="toolbar-button" id="reload-action" type="button" aria-label="Reload page">
				<svg class="toolbar-button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
					<path fill="currentColor" d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
				</svg>
			</button>
			<button class="toolbar-button" id="open-external-action" type="button" aria-label="Open in external browser">
				<svg class="toolbar-button-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false" xmlns="http://www.w3.org/2000/svg">
					<path fill="currentColor" d="M19 19H5V5h7V3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7h-2v7zM14 3v2h3.59l-9.83 9.83 1.41 1.41L19 6.41V10h2V3h-7z"/>
				</svg>
			</button>
		</header>
		<div class="frame-container">
			<div class="frame-loading" id="frame-loading" aria-live="polite">
				<div class="loading-spinner" aria-hidden="true"></div>
				<span>Loading…</span>
			</div>
			<div class="frame-error" id="frame-error" aria-live="polite">
				<div class="frame-error-icon" aria-hidden="true">⊘</div>
				<p class="frame-error-title">This site can't be embedded</p>
				<p class="frame-error-desc">The page refused to load inside ATM Browser.</p>
				<button class="frame-error-btn" id="frame-error-external" type="button">Open in External Browser</button>
			</div>
			<iframe
				id="browser-frame"
				title="ATM Browser content"
				sandbox="allow-scripts allow-forms allow-same-origin allow-downloads allow-popups allow-top-navigation-by-user-activation allow-modals"
			></iframe>
		</div>
	</section>
	<!-- ATM_BROWSER_SCRIPT -->
</body>
</html>
