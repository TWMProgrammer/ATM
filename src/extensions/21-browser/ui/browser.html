<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ATM Translate</title>
	<!-- ATM_BROWSER_STYLES -->
</head>
<body>
	<main class="translator-shell">
		<header class="app-bar">
			<div class="app-identity">
				<div class="app-icon" aria-hidden="true">
					<svg viewBox="0 0 24 24" focusable="false">
						<path d="M12 2a10 10 0 1 0 0 20a10 10 0 0 0 0-20Zm6.93 9h-3.05a15.7 15.7 0 0 0-1.16-5.02A8.03 8.03 0 0 1 18.93 11ZM12 4.04c.75 1.08 1.55 3.27 1.83 6.96h-3.66c.28-3.69 1.08-5.88 1.83-6.96ZM4.26 13h3.86c.11 1.93.41 3.68.86 5.02A8.03 8.03 0 0 1 4.26 13Zm3.86-2H5.07a8.03 8.03 0 0 1 4.21-5.02A15.7 15.7 0 0 0 8.12 11ZM12 19.96c-.75-1.08-1.55-3.27-1.83-6.96h3.66c-.28 3.69-1.08 5.88-1.83 6.96Zm2.72-1.94c.45-1.34.75-3.09.86-5.02h3.86a8.03 8.03 0 0 1-4.72 5.02Z"/>
					</svg>
				</div>
				<div>
					<h1>ATM Translate</h1>
					<p>Fast translation inside VS Code</p>
				</div>
			</div>
			<div class="language-row" aria-label="Translation languages">
				<label class="language-select">
					<span>From</span>
					<select id="source-language"></select>
				</label>
				<button class="icon-button swap-button" id="swap-action" type="button" aria-label="Swap languages" title="Swap languages">
					<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
						<path d="M7 7h11l-3-3l1.41-1.41L21.83 8l-5.42 5.41L15 12l3-3H7V7Zm10 10H6l3 3l-1.41 1.41L2.17 16l5.42-5.41L9 12l-3 3h11v2Z"/>
					</svg>
				</button>
				<label class="language-select">
					<span>To</span>
					<select id="target-language"></select>
				</label>
			</div>
		</header>

		<section class="translate-grid" aria-label="Translator">
			<section class="translate-card input-card">
				<div class="card-toolbar">
					<strong id="source-label">Auto detect</strong>
					<button class="ghost-button" id="clear-action" type="button">Clear</button>
				</div>
				<textarea
					id="source-text"
					placeholder="Write or paste text to translate"
					spellcheck="true"
					autofocus
				></textarea>
				<div class="card-footer">
					<span id="source-count">0 / 5000</span>
					<button class="primary-button" id="translate-action" type="button">
						<span class="button-spinner" id="button-spinner" hidden></span>
						<span id="translate-label">Translate</span>
					</button>
				</div>
			</section>

			<section class="translate-card output-card" aria-live="polite">
				<div class="card-toolbar">
					<strong id="target-label">Spanish</strong>
					<div class="toolbar-actions">
						<button class="icon-button" id="copy-action" type="button" aria-label="Copy translation" title="Copy translation">
							<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
								<path d="M16 1H4a2 2 0 0 0-2 2v12h2V3h12V1Zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Zm0 16H8V7h11v14Z"/>
							</svg>
						</button>
					</div>
				</div>
				<div class="translation-output" id="translation-output">
					<span class="empty-state">Your translation will appear here.</span>
				</div>
				<div class="status-row">
					<span id="status-text">Ready</span>
				</div>
			</section>
		</section>
	</main>
	<!-- ATM_BROWSER_SCRIPT -->
</body>
</html>
