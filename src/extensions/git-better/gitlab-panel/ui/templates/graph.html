<section class="minimap-container">
    <div class="sparkline-container" id="minimap-graph-container" style="width: 100%; height: 100%;">
        <!-- This SVG will be generated by TS, but for the mock we keep a premium looking one -->
        <svg viewBox="0 0 1000 32" preserveAspectRatio="none" style="width: 100%; height: 100%;" id="minimap-svg">
            <!-- Gradients for premium look -->
            <defs>
                <linearGradient id="line-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="var(--accent-blue)" stop-opacity="0.2" />
                    <stop offset="90%" stop-color="var(--accent-blue)" stop-opacity="1" />
                    <stop offset="100%" stop-color="var(--accent-blue)" stop-opacity="0.8" />
                </linearGradient>
                <linearGradient id="area-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="var(--accent-blue)" stop-opacity="0.3" />
                    <stop offset="100%" stop-color="var(--accent-blue)" stop-opacity="0" />
                </linearGradient>
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="2" result="blur" />
                    <feComposite in="SourceGraphic" in2="blur" operator="over" />
                </filter>
            </defs>
            
            <!-- Area under the curve -->
            <path d="M0,16 L880,16 L900,26 L930,6 L950,16 L1000,16 L1000,32 L0,32 Z" fill="url(#area-gradient)" class="sparkline-area" />
            
            <!-- The main flowing line -->
            <path d="M0,16 L880,16 L900,26 L930,6 L950,16 L1000,16" fill="none" stroke="url(#line-gradient)" class="sparkline-path" />
            
            <!-- Pulse animations for branch heads -->
            <circle cx="900" cy="26" r="5" class="sparkline-pulse" />
            <circle cx="930" cy="6" r="5" class="sparkline-pulse pulse-delay" />
            
            <!-- Exact commit nodes -->
            <circle cx="900" cy="26" r="3" class="sparkline-node" />
            <circle cx="930" cy="6" r="3" class="sparkline-node active" />
        </svg>
    </div>
</section>
