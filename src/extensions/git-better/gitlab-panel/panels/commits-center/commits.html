<section class="graph-table-container" style="position: relative;">
    <div class="table-header">
        <div class="col" style="width: 15%">BRANCH / TAG</div>
        <div class="col" style="width: 10%">GRAPH</div>
        <div class="col" style="width: 45%">COMMIT MESSAGE</div>
        <div class="col" style="width: 10%">AUTHOR</div>
        <div class="col" style="width: 10%">CHANGES</div>
        <div class="col" style="width: 10%">DATE</div>
    </div>
    <div class="table-body">
        <!-- Virtual scroll rows will be injected here. For now, multiple static mocks -->
        <div class="table-row active">
            <div class="col" style="width: 15%; min-width: 100px; overflow: visible; display: flex; align-items: center;">
                <div class="avatar-small">M</div>
                <div class="icon-mask" style="--icon-size: 14px; margin-right: 6px; -webkit-mask-image: url('{{ASSETS_URI}}/icons/monitor.svg'); mask-image: url('{{ASSETS_URI}}/icons/monitor.svg'); background-color: white; flex-shrink: 0;"></div>
                <span style="color: white; font-weight: 500; white-space: nowrap;">dev</span>
            </div>
            <!-- The tree graph layer will read this column's x,y to draw the nodes and paths -->
            <div class="col graph-col node-placeholder" data-branch="0" data-color="var(--accent-brand)" style="width: 10%;"></div>
            <div class="col msg-col" style="width: 45%">feat: update keybindings for MDX preview and enhance live preview functionality</div>
            <div class="col" style="width: 10%">You</div>
            <div class="col" style="width: 10%">
                <div class="icon-mask" style="--icon-size: 12px; margin-right: 4px; -webkit-mask-image: url('{{ASSETS_URI}}/icons/changes.svg'); mask-image: url('{{ASSETS_URI}}/icons/changes.svg');"></div>
                2
            </div>
            <div class="col" style="width: 10%; color: var(--text-muted);">yesterday</div>
        </div>

        <div class="table-row">
            <div class="col" style="width: 10%"></div>
            <div class="col graph-col node-placeholder" data-branch="1" data-color="var(--accent-blue)" style="width: 15%;"></div>
            <div class="col" style="width: 45%; color: var(--text-primary); font-family: inherit;">feat: add support for remark-frontmatter</div>
            <div class="col" style="width: 10%">You</div>
            <div class="col" style="width: 10%">
                <div class="icon-mask" style="--icon-size: 12px; margin-right: 4px; -webkit-mask-image: url('{{ASSETS_URI}}/icons/changes.svg'); mask-image: url('{{ASSETS_URI}}/icons/changes.svg');"></div>
                4
            </div>
            <div class="col" style="width: 10%; color: var(--text-muted);">yesterday</div>
        </div>
    </div>
    <!-- Canvas/SVG Graph Overlay layer -->
    <div id="tree-graph-overlay" style="position: absolute; top: var(--toolbar-height, 48px); left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5;">
        <!-- Later the Tree Graph will be rendered here via TS -->
    </div>
</section>
