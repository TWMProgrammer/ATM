<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Better - Graph Panel</title>
    {{CSP}}
    
    <!-- UI Styles -->
    <link href="{{UI_URI}}/styles/theme.css" rel="stylesheet">
    <link href="{{UI_URI}}/styles/layout.css" rel="stylesheet">

    <!-- Anti-White-Flash Critical CSS -->
    <style>
        body {
            background-color: var(--vscode-editor-background, #1e1e1e);
            color: var(--vscode-editor-foreground, #cccccc);
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <!-- 1. Top Configuration Bar (Repos, Branches, Search) -->
    {{TOOLBAR_COMPONENT}}

    <!-- 2. Minimap / Sparkline Area -->
    <section class="minimap-container">
        <div class="sparkline-mock">
            <!-- Mock graph line SVG representing commit activity -->
            <svg viewBox="0 0 1000 32" preserveAspectRatio="none" style="width: 100%; height: 100%;">
                <path d="M0,16 L50,16 L65,5 L80,27 L95,16 L1000,16" fill="none" class="sparkline-path" />
                <circle cx="65" cy="5" r="2.5" class="sparkline-node" />
                <circle cx="80" cy="27" r="2.5" class="sparkline-node" />
            </svg>
        </div>
    </section>

    <!-- 3. Main Workspace Setup (Split View) -->
    <main class="workspace">
        
        <!-- A. Left Sidebar (Icons Panel) -->
        {{SIDEBAR_COMPONENT}}

        <!-- B. Central Graph Table Area -->
        {{TABLE_COMPONENT}}

        <!-- C. Right Inspect Panel (Fixed, pushes graph left) -->
        {{INSPECT_COMPONENT}}

    </main>

    <!-- Logic Components -->
    <script src="{{SCRIPTS_URI}}/search.js" nonce="{{NONCE}}"></script>

    <script nonce="{{NONCE}}">
        (function () {
            const vscode = acquireVsCodeApi();

            // ── Expand/Collapse main panel ──
            const expandBtn = document.getElementById('expand-btn');
            let isExpanded = false;

            if (expandBtn) {
                expandBtn.addEventListener('click', () => {
                    isExpanded = !isExpanded;
                    expandBtn.classList.toggle('expanded', isExpanded);
                    expandBtn.title = isExpanded ? 'Collapse' : 'Expand';
                    vscode.postMessage({ type: 'toggleExpand', expanded: isExpanded });
                });
            }

            // ── Inspect Panel Toggle (Slide in/out) ──
            const inspectPanel = document.getElementById('inspect-panel');
            const inspectToggle = document.getElementById('inspect-toggle');
            let isPanelCollapsed = false;

            const togglePanel = () => {
                isPanelCollapsed = !isPanelCollapsed;
                inspectPanel.classList.toggle('collapsed', isPanelCollapsed);
                inspectToggle.title = isPanelCollapsed ? 'Expand panel' : 'Collapse panel';

                // Swap local SVG icon via mask-image
                const icon = inspectToggle.querySelector('.toggle-icon');
                if (icon) {
                    const iconName = isPanelCollapsed ? 'arrow-left.svg' : 'arrow-right.svg';
                    const newUrl = `url('{{ASSETS_URI}}/icons/${iconName}')`;
                    icon.style.webkitMaskImage = newUrl;
                    icon.style.maskImage = newUrl;
                }
            };

            if (inspectToggle) {
                // Click en el botón (funciona siempre)
                inspectToggle.addEventListener('click', (e) => {
                    e.stopPropagation(); // Evita doble disparo si el panel también escucha
                    togglePanel();
                });
            }

            if (inspectPanel) {
                // Click en cualquier parte del panel (solo cuando está colapsado)
                inspectPanel.addEventListener('click', () => {
                    if (isPanelCollapsed) {
                        togglePanel();
                    }
                });
            }
        })();
    </script>
</body>
</html>
