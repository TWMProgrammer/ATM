<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Better - Graph Panel</title>
    {{CSP}}
    
    <!-- UI Styles -->
    <link href="{{UI_URI}}/styles/theme.css" rel="stylesheet">
    <link href="{{UI_URI}}/styles/layout.css" rel="stylesheet">

    <!-- Anti-White-Flash & FOUC Prevention Critical CSS -->
    <style>
        :root {
            --bg-base: var(--vscode-editor-background, #1e1e1e);
            --bg-toolbar: var(--vscode-sideBar-background, #252526);
            --toolbar-height: 48px;
            --sidebar-width: 48px;
            --inspect-panel-width: 340px;
        }

        body {
            background-color: var(--bg-base);
            color: var(--vscode-editor-foreground, #cccccc);
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            /* Hide content for a split second until CSS is ready */
            opacity: 0;
            transition: opacity 0.1s ease-in;
        }

        /* Essential Layout Skeleton (Applied before external CSS) */
        .top-toolbar { height: var(--toolbar-height); background: var(--bg-toolbar); flex-shrink: 0; display: flex; }
        .workspace { display: flex; flex-grow: 1; overflow: hidden; }
        .sidebar-left { width: var(--sidebar-width); background: var(--bg-toolbar); flex-shrink: 0; }
        .graph-table-container { flex-grow: 1; background: var(--bg-base); }
        .inspect-panel { width: var(--inspect-panel-width); background: var(--vscode-sideBar-background); flex-shrink: 0; }

        /* Show body once fonts/external CSS are likely being processed */
        body.ready { opacity: 1; }
    </style>
</head>
<body class="loading">
    <!-- 1. Top Configuration Bar (Repos, Branches, Search) -->
    {{TOOLBAR_COMPONENT}}

    <!-- 2. Minimap / Sparkline Area -->
    <section class="minimap-container">
        <div class="sparkline-mock">
            <!-- Mock graph line SVG representing commit activity -->
            <svg viewBox="0 0 1000 32" preserveAspectRatio="none" style="width: 100%; height: 100%;">
                <path d="M0,16 L50,16 L65,5 L80,27 L95,16 L1000,16" fill="none" class="sparkline-path" />
                <circle cx="65" cy="5" r="2.5" class="sparkline-node" />
                <circle cx="80" cy="27" r="2.5" class="sparkline-node" />
            </svg>
        </div>
    </section>

    <!-- 3. Main Workspace Setup (Split View) -->
    <main class="workspace">
        
        <!-- A. Left Sidebar (Icons Panel) -->
        {{SIDEBAR_COMPONENT}}

        <!-- B. Central Graph Table Area -->
        {{TABLE_COMPONENT}}

        <!-- C. Right Inspect Panel (Fixed, pushes graph left) -->
        {{INSPECT_COMPONENT}}

    </main>

    <!-- Logic Components -->
    <script nonce="{{NONCE}}">
        // Inject variables for JS components
        window.ASSETS_URI = '{{ASSETS_URI}}';
        window.vscodeApi = acquireVsCodeApi();
        // Immediate show of body to trigger the opacity transition
        document.body.classList.add('ready');
    </script>
    <script src="{{SCRIPTS_URI}}/search.js" nonce="{{NONCE}}"></script>
    <script src="{{SCRIPTS_URI}}/panel.js" nonce="{{NONCE}}"></script>
    <script src="{{SCRIPTS_URI}}/inspect.js" nonce="{{NONCE}}"></script>
</body>
</html>
