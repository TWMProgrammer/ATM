<aside id="inspect-panel" class="inspect-panel">
    <header class="inspect-header">
        <div class="inspect-title">
            <div class="icon-mask" style="--icon-size: 16px; margin-right: 4px; -webkit-mask-image: url('{{ASSETS_URI}}/icons/github.svg'); mask-image: url('{{ASSETS_URI}}/icons/github.svg');"></div>
            <span>OPEN ON GITHUB: <span id="inspect-commit-hash">abe57c9</span></span>
        </div>
        <button id="inspect-toggle" class="icon-btn inspect-toggle-btn" title="Collapse panel">
            <div class="icon-mask toggle-icon" style="--icon-size: 16px; -webkit-mask-image: url('{{ASSETS_URI}}/icons/arrow-right.svg'); mask-image: url('{{ASSETS_URI}}/icons/arrow-right.svg');"></div>
        </button>
    </header>
    
    <div class="inspect-body">
        <div class="inspect-content">
            <div class="commit-header">
                <div id="inspect-author-avatar" class="avatar-mock">Y</div>
                <div class="author-info">
                    <span id="inspect-author-name" class="author-name" style="font-weight: 500;">You</span>
                    <div style="display: flex; gap: 6px;">
                        <button id="btn-explain" class="btn-explain" title="Explain with AI">
                            <div class="icon-mask" style="--icon-size: 12px; margin-right: 4px; background-color: var(--text-primary); -webkit-mask-image: url('{{ASSETS_URI}}/icons/sparkle.svg'); mask-image: url('{{ASSETS_URI}}/icons/sparkle.svg');"></div>
                            Copy
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="commit-message-box">
                <h4 id="inspect-commit-title" class="commit-title">🏗️ feat: update keybindings for MDX preview and enhance live preview functionality</h4>
                <span class="commit-date" style="display: flex; align-items: center; gap: 4px;">
                    <div class="icon-mask" style="--icon-size: 10px; opacity: 0.6; -webkit-mask-image: url('{{ASSETS_URI}}/icons/history.svg'); mask-image: url('{{ASSETS_URI}}/icons/history.svg');"></div>
                    <span id="inspect-commit-date">yesterday</span>
                </span>
            </div>
            
            <div class="files-changed-section">
                <div class="files-header">
                    <span style="display: flex; align-items: center; gap: 6px;">
                        <div class="icon-mask" style="--icon-size: 12px; -webkit-mask-image: url('{{ASSETS_URI}}/icons/list-flat.svg'); mask-image: url('{{ASSETS_URI}}/icons/list-flat.svg');"></div>
                        <span id="inspect-files-count-text">2 FILES CHANGED</span>
                    </span>
                    <span class="diff-stats">
                        <span id="inspect-stats-add" class="add">+0</span>
                        <span id="inspect-stats-del" class="del">-2</span>
                    </span>
                </div>
                <ul id="inspect-file-list" class="file-list">
                    <li>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span style="color: var(--accent-blue); font-weight: bold;">M</span>
                            <span>MdxPreviewManager.ts</span>
                        </div>
                        <div class="icon-mask" style="--icon-size: 14px; opacity: 0.7; cursor: pointer; -webkit-mask-image: url('{{ASSETS_URI}}/icons/eye.svg'); mask-image: url('{{ASSETS_URI}}/icons/eye.svg');"></div>
                    </li>
                    <li>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span style="color: var(--accent-blue); font-weight: bold;">M</span>
                            <span>package.json</span>
                        </div>
                        <div class="icon-mask" style="--icon-size: 14px; opacity: 0.7; cursor: pointer; -webkit-mask-image: url('{{ASSETS_URI}}/icons/eye.svg'); mask-image: url('{{ASSETS_URI}}/icons/eye.svg');"></div>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</aside>
