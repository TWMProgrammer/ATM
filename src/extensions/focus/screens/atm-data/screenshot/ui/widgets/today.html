<div class="section-title-wrapper">
    <span class="section-title">PERFORMANCE INSIGHTS</span>
    <div class="section-divider"></div>
</div>

<div class="bento-grid">
    <!-- Row 1 -->
    <div class="bento-card col-2" style="--icon-color: #3794ff;">
        <div class="bento-header">
            <div class="bento-icon-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="icon" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
            </div>
            <span class="bento-badge">Today</span>
        </div>
        <div class="bento-content">
            <div class="bento-value skeleton" id="ui-stat-time" style="color: var(--icon-color); width: 60px;">2h</div>
            <div class="bento-label">CODING TIME</div>
        </div>
    </div>

    <div class="bento-card" style="--icon-color: #2ea043;">
        <div class="bento-header">
            <div class="bento-icon-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="icon" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><line x1="3" y1="12" x2="9" y2="12"></line><line x1="15" y1="12" x2="21" y2="12"></line></svg>
            </div>
        </div>
        <div class="bento-content">
            <div class="bento-value skeleton" id="ui-stat-commits" style="color: var(--icon-color); width: 40px;">4</div>
            <div class="bento-label">COMMITS</div>
        </div>
    </div>

    <div class="bento-card" style="--icon-color: #ffbd2e;">
        <div class="bento-header">
            <div class="bento-icon-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="icon" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"></circle><path d="M12 2v4"></path><path d="M12 18v4"></path><path d="M2 12h4"></path><path d="M18 12h4"></path>
                </svg>
            </div>
        </div>
        <div class="bento-content">
            <div class="bento-value skeleton" id="ui-stat-pomodoro" style="color: var(--icon-color); width: 40px;">0</div>
            <div class="bento-label">POMOS</div>
        </div>
    </div>

    <!-- Row 2 -->
    <div class="bento-card col-2" style="--icon-color: #ff7b72; background: linear-gradient(135deg, color-mix(in srgb, var(--card-bg) 80%, transparent), color-mix(in srgb, #ff7b72 10%, transparent));">
        <div class="bento-header">
            <div class="bento-icon-wrapper" style="background: color-mix(in srgb, #ff7b72 25%, transparent);">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="icon" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c-2.28 0-3-4.5-3-4.5s.5 2.5 2 2.5c2 0 3.5-1.5 3.5-3.5s-2-3-2-3a5.5 5.5 0 0 1 5 6.5c0 3.5-3 6.5-6.5 6.5a6.5 6.5 0 0 1-1.5-12.8v1.3A5.5 5.5 0 0 0 8.5 14.5z"></path></svg>
            </div>
            <span class="bento-badge" style="background: color-mix(in srgb, #ff7b72 20%, transparent);">Momentum</span>
        </div>
        <div class="bento-content">
            <div class="bento-value skeleton" id="ui-stat-streak-full" style="color: var(--icon-color); width: 80px;">13 Days</div>
            <div class="bento-label">CURRENT STREAK</div>
        </div>
    </div>

    <div class="bento-card" style="--icon-color: #8957e5;">
        <div class="bento-header">
            <div class="bento-icon-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="icon" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
            </div>
        </div>
        <div class="bento-content">
            <div class="bento-value skeleton" id="ui-stat-active-days" style="color: var(--icon-color); width: 40px;">139</div>
            <div class="bento-label">ACTIVE DAYS</div>
        </div>
    </div>

    <div class="bento-card" style="--icon-color: #b392f0;">
        <div class="bento-header">
            <div class="bento-icon-wrapper">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="icon" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15.5 2H8.6c-.4 0-.8.2-1.1.5-.3.3-.5.7-.5 1.1v12.8c0 .4.2.8.5 1.1.3.3.7.5 1.1.5h9.8c.4 0 .8-.2 1.1-.5.3-.3.5-.7.5-1.1V6.5L15.5 2z"></path><path d="M3 7.6v12.8c0 .4.2.8.5 1.1.3.3.7.5 1.1.5h9.8"></path></svg>
            </div>
        </div>
        <div class="bento-content">
            <div class="bento-value skeleton" id="ui-stat-files" style="color: var(--icon-color); width: 40px;">12</div>
            <div class="bento-label">FILES MODIFIED</div>
        </div>
    </div>

    <!-- Row 3 - Music & Focus Mode -->
    <div class="bento-card col-3 bento-music" style="--icon-color: #ff2a5f;">
        <div class="music-media-content">
            <div class="bento-icon-wrapper bounce-anim" style="background: color-mix(in srgb, #ff2a5f 15%, transparent); border-radius: 50%;">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="icon" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 18V5l12-2v13"></path>
                    <circle cx="6" cy="18" r="3"></circle>
                    <circle cx="18" cy="16" r="3"></circle>
                </svg>
            </div>
            <div class="music-info">
                <div class="bento-label" style="color: color-mix(in srgb, var(--icon-color) 70%, transparent); font-size: 8px;">LAST PLAYED TRACK</div>
                <div class="music-title skeleton" id="ui-stat-music" style="width: 180px; height: 16px;"></div>
            </div>
        </div>
        <div class="music-waves">
           <span></span><span></span><span></span><span></span><span></span>
        </div>
    </div>
    
    <div class="bento-card" style="--icon-color: #00d2ff; justify-content: center; align-items: center; border: 1px solid color-mix(in srgb, #00d2ff 30%, transparent); background: linear-gradient(180deg, color-mix(in srgb, var(--card-bg) 60%, transparent), color-mix(in srgb, #00d2ff 8%, transparent));">
        <div class="bento-icon-wrapper" style="margin: 0 auto 6px auto; width: 30px; height: 30px; border-radius: 50%; background: color-mix(in srgb, #00d2ff 25%, transparent); box-shadow: 0 0 15px color-mix(in srgb, #00d2ff 40%, transparent);">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" class="icon" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 15px; height: 15px; color: #00d2ff;"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>
        </div>
        <div class="bento-value reveal-anim" style="font-size: 13px; color: var(--icon-color); text-transform: uppercase; margin-bottom: 2px;">Deep</div>
        <div class="bento-label" style="font-size: 8px;">FLOW ZONE</div>
    </div>
</div>
