<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Dashboard</title>
</head>
<body>
    <div class="dashboard-container">
        <div class="mac-header">
            <div class="mac-button close"></div>
            <div class="mac-button minimize"></div>
            <div class="mac-button expand"></div>
        </div>
        <div class="dashboard-content">
            {{profileWidget}}
            {{heatmapWidget}}
            {{todayWidget}}
        </div>
    </div>
        
    <!-- Action Footer -->
    {{actionsWidget}}
    <script>
        // Generate Heatmap squares
        const grid = document.getElementById('heatmapGrid');
        const fragment = document.createDocumentFragment();
        // 52 cols * 7 rows
        const cols = 52;
        const rows = 7;
        const total = cols * rows;
        
        // Pattern logic to spell "gohitx" (approximate/random logic)
        for (let i = 0; i < total; i++) {
            const cell = document.createElement('div');
            cell.className = 'heatmap-cell skeleton'; // Added skeleton by default
            cell.style.animationDelay = `${Math.random() * 0.5}s`; // Staggered pulse
            fragment.appendChild(cell);
        }
        grid.appendChild(fragment);
    </script>
</body>
</html>
