<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="color-scheme" content="dark light">
	<title>ATM Translate</title>
	<!-- ATM_BROWSER_STYLES -->
</head>
<body>
	<div class="glass-orb glass-orb--top" aria-hidden="true"></div>
	<div class="glass-orb glass-orb--bottom" aria-hidden="true"></div>
	<div class="glass-orb glass-orb--mid" aria-hidden="true"></div>

	<main class="translator-shell">
		<header class="app-bar">
			<div class="app-identity">
				<div class="app-icon" aria-hidden="true">
					<img src="ATM_LOGO_SRC" alt="ATM Logo" />
				</div>
				<div>
					<h1>ATM Translate</h1>
					<p>Optimize prompts, reduce token costs</p>
				</div>
			</div>
			<div class="language-row" aria-label="Translation languages">
				<label class="language-select">
					<span>From</span>
					<select id="source-language"></select>
				</label>
				<button class="icon-button swap-button" id="swap-action" type="button" aria-label="Swap languages" title="Swap languages">
					<svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
						<path d="M7 7h11l-3-3l1.41-1.41L21.83 8l-5.42 5.41L15 12l3-3H7V7Zm10 10H6l3 3l-1.41 1.41L2.17 16l5.42-5.41L9 12l-3 3h11v2Z"/>
					</svg>
				</button>
				<label class="language-select">
					<span>To</span>
					<select id="target-language"></select>
				</label>
			</div>
		</header>

		<section class="translate-grid" aria-label="Translator">
			<section class="translate-card input-card">
				<div class="card-toolbar">
					<strong id="source-label">Auto detect</strong>
					<div class="toolbar-actions">
						<button class="ghost-button ghost-button--spell" id="spellcheck-action" type="button" title="Correct spelling">
							<svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
								<path d="M7.53 1.22a.75.75 0 0 1 1.06 0l1.72 1.72 1.72-1.72a.75.75 0 0 1 1.06 1.06L11.37 4l1.72 1.72a.75.75 0 0 1-1.06 1.06L10.31 5.06 8.59 6.78a.75.75 0 0 1-1.06 0L5.81 5.06 4.09 6.78a.75.75 0 0 1-1.06-1.06L4.75 4 3.03 2.28a.75.75 0 0 1 1.06-1.06L5.81 2.94 7.53 1.22ZM8 9.5a4 4 0 0 0-4 4v.5a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-.5a4 4 0 0 0-4-4Z"/>
							</svg>
							<span>Fix spelling</span>
						</button>
						<button class="ghost-button" id="clear-action" type="button">Clear</button>
					</div>
				</div>
				<div class="textarea-wrap" id="source-text-wrap">
					<div class="source-highlight" id="source-highlight" aria-hidden="true"></div>
					<textarea
						id="source-text"
						placeholder="Write or paste text to translate..."
						spellcheck="true"
						autofocus
					></textarea>
				</div>
				<div class="card-footer">
					<div class="footer-left">
						<label class="toggle-switch" id="auto-toggle" title="Auto-translate as you type">
							<input type="checkbox" id="auto-translate-check" />
							<span class="toggle-track">
								<span class="toggle-thumb"></span>
							</span>
							<span class="toggle-label">Auto</span>
						</label>
						<span id="source-count">0 / 5000</span>
					</div>
					<button class="primary-button" id="translate-action" type="button">
						<span class="button-spinner" id="button-spinner" hidden></span>
						<span id="translate-label">Translate</span>
					</button>
				</div>
			</section>

			<section class="translate-card output-card" aria-live="polite">
				<div class="card-toolbar">
					<strong id="target-label">English</strong>
					<div class="toolbar-actions">
					<button class="icon-button copy-button" id="copy-action" type="button" aria-label="Copy translation" title="Copy translation">
						<svg class="icon-copy" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
							<path d="M16 1H4a2 2 0 0 0-2 2v12h2V3h12V1Zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2Zm0 16H8V7h11v14Z"/>
						</svg>
					<svg class="icon-check" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
						<path d="M20 6 9 17l-5-5"/>
					</svg>
					</button>
					</div>
				</div>
				<div class="translation-output" id="translation-output">
					<span class="empty-state">Your translation will appear here.</span>
				</div>
				<div class="status-row">
					<span id="status-text">Ready</span>
				</div>
			</section>
		</section>
	</main>
	<!-- ATM_BROWSER_SCRIPT -->
</body>
</html>
