<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATM Dashboard</title>
</head>
<body>
    <div class="dashboard-container">
        <div class="dashboard-content">
            {{profileWidget}}
            {{heatmapWidget}}
            {{todayWidget}}
        </div>
        
        <div class="atm-brand-footer">
            <img class="atm-brand-icon" src="{{atmIconUri}}" alt="ATM Logo">
            <span class="atm-brand-text">ATM Extension</span>
        </div>
    </div>
        
    <!-- Action Footer -->
    {{actionsWidget}}
    <script>
        // Generate Heatmap skeleton squares - max 53 weeks × 7 days
        const grid = document.getElementById('heatmapGrid');
        const fragment = document.createDocumentFragment();
        const cols = 53;
        const rows = 7;
        const total = cols * rows;
        
        for (let i = 0; i < total; i++) {
            const cell = document.createElement('div');
            cell.className = 'heatmap-cell skeleton';
            fragment.appendChild(cell);
        }
        grid.appendChild(fragment);
    </script>
</body>
</html>
