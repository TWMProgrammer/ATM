<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
	<style>
		.icon-stroke { fill: none; stroke: #fff; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
		.icon-fill { fill: #fff; stroke: none; }
		.compass-ring { opacity: .9; }
		.tick-group line { stroke-width: 3; opacity: .7; }
		.compass-needle { transform-origin: 50px 50px; animation: compassSpin 7s linear infinite; }
		.needle-a { opacity: .95; }
		.needle-b { opacity: .45; }
		@keyframes compassSpin { to { transform: rotate(360deg); } }
		@media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
	</style>
	<circle cx="50" cy="50" r="34" class="icon-stroke compass-ring"/>
	<g class="tick-group icon-stroke">
		<line x1="50" y1="8" x2="50" y2="16"/>
		<line x1="50" y1="84" x2="50" y2="92"/>
		<line x1="8" y1="50" x2="16" y2="50"/>
		<line x1="84" y1="50" x2="92" y2="50"/>
	</g>
	<g class="compass-needle">
		<path d="M50 20 L58 50 L50 50 Z" class="icon-fill needle-a"/>
		<path d="M50 80 L42 50 L50 50 Z" class="icon-fill needle-b"/>
	</g>
	<circle cx="50" cy="50" r="4" class="icon-fill needle-a"/>
</svg>