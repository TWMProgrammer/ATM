<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ATM IRA</title>
	<!-- ATM_IRA_STYLES -->
</head>
<body>
	<main class="panels">

		<!-- 1. Browser -->
		<section
			class="panel"
			style="--active-color:#f87171"
			data-action="browser"
			role="button"
			tabindex="0"
			aria-label="Abrir navegador"
		>
			<pixel-canvas data-gap="6" data-speed="45" data-colors="#fecaca,#f87171,#ef4444"></pixel-canvas>
			<div class="content">
				<div class="icon-wrap">
					<!-- ATM_IRA_ICON_BROWSER -->
				</div>
				<span class="label">Navegador</span>
			</div>
		</section>

		<!-- 2. Compare code -->
		<section
			class="panel"
			style="--active-color:#4ade80"
			data-action="compare"
			role="button"
			tabindex="0"
			aria-label="Comparar codigo"
		>
			<pixel-canvas data-gap="5" data-speed="32" data-colors="#bbf7d0,#4ade80,#22c55e"></pixel-canvas>
			<div class="content">
				<div class="icon-wrap">
					<!-- ATM_IRA_ICON_COMPARE -->
				</div>
				<span class="label">Comparar</span>
			</div>
		</section>

		<!-- 3. Translate -->
		<section
			class="panel"
			style="--active-color:#facc15"
			data-action="translate"
			role="button"
			tabindex="0"
			aria-label="Traducir idioma"
		>
			<pixel-canvas data-gap="4" data-speed="26" data-colors="#fef08a,#fde047,#eab308"></pixel-canvas>
			<div class="content">
				<div class="icon-wrap">
					<!-- ATM_IRA_ICON_TRANSLATE -->
				</div>
				<span class="label">Traducir</span>
			</div>
		</section>

		<!-- 4. Git / GitHub shortcuts -->
		<section
			class="panel"
			style="--active-color:#60a5fa"
			data-action="git"
			role="button"
			tabindex="0"
			aria-label="Acciones de git"
		>
			<pixel-canvas data-gap="7" data-speed="60" data-colors="#bfdbfe,#60a5fa,#3b82f6"></pixel-canvas>
			<div class="content">
				<div class="icon-wrap">
					<!-- ATM_IRA_ICON_GIT -->
				</div>
				<span class="label">Git</span>
			</div>
		</section>

	</main>
	<!-- ATM_IRA_SCRIPT -->
</body>
</html>
