<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ATM</title>
	<!-- ATM_IRA_STYLES -->
</head>
<body>
	<div class="panels">

		<!-- 1. Red -> opens a web browser -->
		<div class="panel panel--red" role="button" tabindex="0" aria-label="Abrir navegador">
			<div class="icon-wrap">
				<!-- ATM_IRA_ICON_BROWSER -->
			</div>
		</div>

		<!-- 2. Green -> code comparison -->
		<div class="panel panel--green" role="button" tabindex="0" aria-label="Comparar codigo">
			<div class="icon-wrap">
				<!-- ATM_IRA_ICON_COMPARE -->
			</div>
		</div>

		<!-- 3. Yellow -> language translator -->
		<div class="panel panel--yellow" role="button" tabindex="0" aria-label="Traducir idioma">
			<div class="icon-wrap">
				<!-- ATM_IRA_ICON_TRANSLATE -->
			</div>
		</div>

		<!-- 4. Blue -> Git / GitHub shortcuts -->
		<div class="panel panel--blue" role="button" tabindex="0" aria-label="Acciones de git">
			<div class="icon-wrap">
				<!-- ATM_IRA_ICON_GIT -->
			</div>
		</div>

	</div>
</body>
</html>
