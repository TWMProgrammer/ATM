<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- ATM_BROWSER_HEAD -->
    <title>Browser</title>
  </head>
  <body>
    <header id="toolbar">
      <button id="nav-back" class="tool-btn" title="Back" disabled>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M10 2.8 4.8 8 10 13.2" />
        </svg>
      </button>
      <button id="nav-forward" class="tool-btn" title="Forward" disabled>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M6 2.8 11.2 8 6 13.2" />
        </svg>
      </button>
      <button id="nav-reload" class="tool-btn" title="Reload">
        <svg class="icon-reload" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M13.4 8a5.4 5.4 0 1 1-1.55-3.79" />
          <path d="M13.6 1.6v3.2h-3.2" />
        </svg>
        <svg class="icon-stop" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M3.5 3.5l9 9M12.5 3.5l-9 9" />
        </svg>
      </button>
      <div id="url-wrap">
        <input
          id="url-input"
          type="text"
          placeholder="Search or enter URL"
          spellcheck="false"
          autocomplete="off"
        />
      </div>
      <button id="open-external" class="tool-btn" title="Open in system browser">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M6.5 3.5H3a.5.5 0 0 0-.5.5v9a.5.5 0 0 0 .5.5h9a.5.5 0 0 0 .5-.5V9.5" />
          <path d="M9.5 2.5h4v4M13.2 2.8 7.5 8.5" />
        </svg>
      </button>
    </header>
    <main id="stage">
      <canvas id="screen" tabindex="0"></canvas>
      <div id="overlay">
        <div class="spinner"></div>
        <p id="overlay-text">Starting browser…</p>
        <p id="overlay-hint" hidden></p>
      </div>
    </main>
    <!-- ATM_BROWSER_SCRIPT -->
  </body>
</html>
