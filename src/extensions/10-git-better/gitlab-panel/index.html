<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Git Better - GitLab Panel</title>
    {{CSP}}

    <!-- Shared Styles -->
    <link href="{{SHARED_URI}}/global.css" rel="stylesheet">
    <link href="{{SHARED_URI}}/skeleton/inspect.css" rel="stylesheet">
    <link href="{{SHARED_URI}}/skeleton/graphics.css" rel="stylesheet">
    <link href="{{SHARED_URI}}/skeleton/stats.css" rel="stylesheet">

    <!-- Panel Styles -->
    <link href="{{PANELS_URI}}/header/header.css" rel="stylesheet">
    <link href="{{PANELS_URI}}/graphics-top/graphics.css" rel="stylesheet">
    <link href="{{PANELS_URI}}/stats-left/stats.css" rel="stylesheet">
    <link href="{{PANELS_URI}}/commits-center/commits.css" rel="stylesheet">
    <link href="{{PANELS_URI}}/inspect-right/inspect.css" rel="stylesheet">

    <!-- Anti-White-Flash & FOUC Prevention Critical CSS -->
    <style>
        :root {
            --bg-base: var(--vscode-editor-background, #1e1e1e);
            --bg-toolbar: var(--vscode-sideBar-background, #252526);
            --toolbar-height: 48px;
            --sidebar-width: 48px;
            --inspect-panel-width: 340px;
        }

        body {
            background-color: var(--bg-base);
            color: var(--vscode-editor-foreground, #cccccc);
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            opacity: 0;
            transition: opacity 0.1s ease-in;
        }

        /* Essential Layout Skeleton */
        .top-toolbar { height: var(--toolbar-height); background: var(--bg-toolbar); flex-shrink: 0; display: flex; }
        .workspace { display: flex; flex-grow: 1; overflow: hidden; }
        .sidebar-left { width: var(--sidebar-width); background: var(--bg-toolbar); flex-shrink: 0; }
        .graph-table-container { flex-grow: 1; background: var(--bg-base); }
        .inspect-panel { width: var(--inspect-panel-width); background: var(--vscode-sideBar-background); flex-shrink: 0; }

        body.ready { opacity: 1; }
    </style>
</head>
<body class="loading">
    <!-- 1. Top Configuration Bar (Repos, Branches, Search) -->
    {{HEADER_COMPONENT}}

    <!-- 2. Minimap / Sparkline Area -->
    {{GRAPHICS_TOP_COMPONENT}}

    <!-- 3. Main Workspace Setup (Split View) -->
    <main class="workspace">

        <!-- A. Left Sidebar (Icons Panel) -->
        {{STATS_LEFT_COMPONENT}}

        <!-- B. Central Graph Table Area -->
        {{COMMITS_CENTER_COMPONENT}}

        <!-- C. Right Inspect Panel (Fixed, pushes graph left) -->
        {{INSPECT_RIGHT_COMPONENT}}

    </main>

    <!-- Logic Components -->
    <script nonce="{{NONCE}}">
        window.ASSETS_URI = '{{ASSETS_URI}}';
        window.vscodeApi = acquireVsCodeApi();
        document.body.classList.add('ready');
    </script>
    <script src="{{SCRIPTS_URI}}/header.js" nonce="{{NONCE}}"></script>
    <script src="{{SCRIPTS_URI}}/graphics.js" nonce="{{NONCE}}"></script>
    <script src="{{SCRIPTS_URI}}/stats.js" nonce="{{NONCE}}"></script>
    <script src="{{SCRIPTS_URI}}/commits.js" nonce="{{NONCE}}"></script>
    <script src="{{SCRIPTS_URI}}/inspect.js" nonce="{{NONCE}}"></script>
</body>
</html>
