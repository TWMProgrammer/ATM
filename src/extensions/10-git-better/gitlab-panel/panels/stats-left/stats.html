<aside class="sidebar-left">
    <!-- Total Branches -->
    <div class="sidebar-info-item" title="Branches">
        <div class="icon-mask" style="--icon-size: 18px; -webkit-mask-image: url('{{ASSETS_URI}}/icons/git-graph.svg'); mask-image: url('{{ASSETS_URI}}/icons/git-graph.svg');"></div>
        <span class="info-badge" id="stats-branches"><span class="stats-skeleton"></span></span>
    </div>
    <!-- Total Commits (History) -->
    <div class="sidebar-info-item" title="History (Commits)">
        <div class="icon-mask" style="--icon-size: 18px; -webkit-mask-image: url('{{ASSETS_URI}}/icons/git-history.svg'); mask-image: url('{{ASSETS_URI}}/icons/git-history.svg');"></div>
        <span class="info-badge" id="stats-commits"><span class="stats-skeleton" style="animation-delay: 0.2s;"></span></span>
    </div>
    <!-- Total Tags -->
    <div class="sidebar-info-item" title="Tags">
        <div class="icon-mask" style="--icon-size: 18px; -webkit-mask-image: url('{{ASSETS_URI}}/icons/git-commits.svg'); mask-image: url('{{ASSETS_URI}}/icons/git-commits.svg');"></div>
        <span class="info-badge" id="stats-tags"><span class="stats-skeleton" style="animation-delay: 0.4s;"></span></span>
    </div>
    <!-- Total Stashes -->
    <div class="sidebar-info-item" title="Stashes">
        <div class="icon-mask" style="--icon-size: 18px; -webkit-mask-image: url('{{ASSETS_URI}}/icons/git-stashes.svg'); mask-image: url('{{ASSETS_URI}}/icons/git-stashes.svg');"></div>
        <span class="info-badge" id="stats-stashes"><span class="stats-skeleton" style="animation-delay: 0.6s;"></span></span>
    </div>
</aside>
